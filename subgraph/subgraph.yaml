specVersion: 1.0.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: StakingVault
    network: sepolia
    source:
      address: "0x0000000000000000000000000000000000000000"
      abi: StakingVault
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Deposit
        - Withdrawal
        - RewardEvent
        - User
        - VaultMetric
      abis:
        - name: StakingVault
          file: ./abis/StakingVault.json
      eventHandlers:
        - event: Deposit(indexed address,indexed address,uint256,uint256)
          handler: handleDeposit
        - event: Withdraw(indexed address,indexed address,indexed address,uint256,uint256)
          handler: handleWithdraw
        - event: RewardsDistributed(indexed address,uint256,uint256)
          handler: handleRewards
      file: ./src/mapping.ts
