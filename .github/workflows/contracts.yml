name: Contracts CI

on:
  push:
    paths: ['contracts/**', '.github/workflows/contracts.yml']
  pull_request:
    paths: ['contracts/**', '.github/workflows/contracts.yml']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: |
          forge install --no-git --shallow OpenZeppelin/openzeppelin-contracts@v5.1.0
          forge install --no-git --shallow OpenZeppelin/openzeppelin-contracts-upgradeable@v5.1.0

      - name: Format check
        run: forge fmt --check

      - name: Build
        run: forge build --sizes

      - name: Test (excluding slow invariant)
        run: forge test --no-match-path "test/StakingVault.invariant.t.sol" -vvv

      - name: Coverage
        run: forge coverage --no-match-coverage "test|mocks" --report summary

  slither:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: |
          forge install --no-git --shallow OpenZeppelin/openzeppelin-contracts@v5.1.0
          forge install --no-git --shallow OpenZeppelin/openzeppelin-contracts-upgradeable@v5.1.0

      - name: Build
        run: forge build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Slither
        run: pip install slither-analyzer

      - name: Run Slither
        run: slither . --config-file ../slither.config.json
