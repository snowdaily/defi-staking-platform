[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false
gas_reports = ["StakingVault", "LiquidStakingToken", "RewardDistributor"]
fs_permissions = [{ access = "read", path = "./" }]

[profile.ci]
fuzz = { runs = 10000 }
invariant = { runs = 256, depth = 500 }

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}" }
